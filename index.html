  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>排泄チェックシート</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="排泄チェック">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5efe4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,252,246,0.97);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }
    .chara-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
      animation: bow 3s ease-in-out infinite;
    }
    @keyframes bow {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    .chara-img {
      width: 180px;
      height: auto;
      display: block;
    }
    .speech-bubble {
      position: absolute;
      top: 20px;
      right: -110px;
      background: #fff;
      border: 2.5px solid #1F4E79;
      border-radius: 16px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: bold;
      color: #1F4E79;
      white-space: nowrap;
      line-height: 1.6;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.10);
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-right-color: #1F4E79;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-right-color: #fff;
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      color: #1F4E79;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .message {
      font-size: 15px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .date-box {
      background: #D5E8F0;
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 24px;
    }
    .date-label { font-size: 13px; color: #2E75B6; margin-bottom: 4px; }
    .date-value { font-size: 20px; font-weight: bold; color: #1F4E79; }
    .footer { font-size: 12px; color: #aaa; line-height: 1.6; }
    .divider { border: none; border-top: 1px solid #e0d8cc; margin: 20px 0; }
  </style>
</head>
